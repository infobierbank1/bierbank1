<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vielen Dank | Bierbank №1</title>
    <style>
        :root {
            --gold: #d4af37;
            --black: #1a1a1a;
            --white: #ffffff;
        }
        body {
            background-color: var(--black);
            color: var(--white);
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .thanks-container {
            padding: 40px;
            border: 1px solid var(--gold);
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            max-width: 500px;
        }
        h1 {
            color: var(--gold);
            font-size: 2.5rem;
            margin-bottom: 20px;
        }
        p {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .btn-back {
            display: inline-block;
            padding: 12px 30px;
            background-color: var(--gold);
            color: var(--black);
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
            transition: 0.3s;
        }
        .btn-back:hover {
            background-color: var(--white);
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="thanks-container">
        <h1>Vielen Dank!</h1>
        <p>Ihre Nachricht wurde erfolgreich gesendet. <br> Wir werden uns so schnell wie möglich bei Ihnen melden.</p>
        <a href="index.html" class="btn-back">Zurück zur Startseite</a>
    </div>
</body>
</html>
